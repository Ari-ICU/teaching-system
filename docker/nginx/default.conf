server {
    listen 80;
    server_name localhost;

    # Increase max upload size for logos
    client_max_body_size 10M;

    # ─── CORS Configuration ───
    set $cors_origin "";
    if ($http_origin ~* (https?://localhost(:[0-9]+)?$)) {
        set $cors_origin $http_origin;
    }

    # Helper for CORS headers
    set $cors_methods 'GET, POST, OPTIONS, PUT, DELETE, PATCH';
    set $cors_headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';

    # ─── Frontend (Next.js) ───
    location / {
        proxy_pass http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Add CORS headers
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' $cors_methods always;
        add_header 'Access-Control-Allow-Headers' $cors_headers always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_methods always;
            add_header 'Access-Control-Allow-Headers' $cors_headers always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # ─── Backend API (Laravel) ───
    location /api {
        root /var/www/backend/public;
        try_files $uri $uri/ @laravel;
    }

    # ─── Storage (Laravel Public Disk) ───
    location /storage {
        add_header 'Access-Control-Allow-Origin' '*' always;
        alias /var/www/backend/public/storage;
        try_files $uri $uri/ =404;
    }

    location @laravel {
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;

        # Let Laravel handle CORS for non-OPTIONS requests.
        # But we still handle OPTIONS in Nginx for performance.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_methods always;
            add_header 'Access-Control-Allow-Headers' $cors_headers always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
